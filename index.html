<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor's BMI Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Victor's BMI Calculator</h1>
        <div class="card">
            <div class="unit-toggle">
                <button id="metricBtn" class="toggle-btn active" onclick="setUnit('metric')">Metric</button>
                <button id="imperialBtn" class="toggle-btn" onclick="setUnit('imperial')">Imperial</button>
            </div>

            <div class="input-group">
                <label for="weight" id="weightLabel">Weight (kg)</label>
                <input type="number" id="weight" placeholder="Enter weight" min="1" step="0.1">
            </div>

            <div class="input-group">
                <label for="height" id="heightLabel">Height (cm)</label>
                <input type="number" id="height" placeholder="Enter height" min="1" step="0.1">
            </div>

            <button class="calc-btn" onclick="calculateBMI()">Calculate BMI</button>

            <div id="result" class="result hidden">
                <div class="bmi-value" id="bmiValue"></div>
                <div class="bmi-category" id="bmiCategory"></div>
                <div class="bmi-bar-container">
                    <div class="bmi-bar">
                        <div class="bmi-marker" id="bmiMarker"></div>
                    </div>
                    <div class="bmi-labels">
                        <span>Underweight</span>
                        <span>Normal</span>
                        <span>Overweight</span>
                        <span>Obese</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
